services:
  db:
    image: postgres:15-alpine
    container_name: seedbank_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seedbank_cloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seedbank_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seedbank_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/seedbank_cloud
      - JWT_SECRET=seedbank_secure_jwt_token_secret_key_2026
      - JWT_EXPIRE=24h
      - CORS_ORIGIN=http://localhost
      - FRONTEND_URL=http://localhost
      - LOG_LEVEL=info
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
      - ./backend/logs:/usr/src/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seedbank_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seedbank_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - seedbank_network

volumes:
  postgres_data:

networks:
  seedbank_network:
    driver: bridge
